<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mapa interativo das congregações da Campo Maguari em Belém, PA">
  <title>Mapa de Congregações - Maguari</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>⛪ Mapa de Congregações Maguari</h1>
      <p>Campo Maguari, Belém - PA</p>
    </header>

    <div id="map"></div>

    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="🔍 Buscar congregação..."
      >
    </div>

    <div class="stats">
      <div class="stats-label">Total de Congregações</div>
      <div class="stats-value">0</div>
    </div>

    <div class="legend">
      <h3>Legenda</h3>
      <div class="legend-item">
        <div class="legend-marker"></div>
        <span>Congregação</span>
      </div>
      <div class="legend-item">
        <div class="legend-polygon"></div>
        <span>Limite do Campo</span>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
